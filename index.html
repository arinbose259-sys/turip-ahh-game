<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subway Surfers: Neon Shop Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        
        /* UI LAYOUT */
        #game-ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 24px; text-shadow: 0 0 10px #00ffcc; z-index: 10; display: none; }
        
        #menu { 
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(20,0,40,0.95)); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; z-index: 100; 
        }

        /* SHOP STYLING */
        .shop-box { background: #111; padding: 20px; border-radius: 15px; border: 2px solid #333; margin: 20px 0; width: 400px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #222; }
        .price { color: #fbbf24; font-size: 18px; }

        .btn { padding: 15px 40px; font-size: 22px; background: #00ffcc; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00ffcc; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); background: #fff; }
        .buy-btn { padding: 5px 15px; font-size: 14px; background: #3b82f6; color: white; border-radius: 5px; cursor: pointer; border: none; }

        #powerup-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #ff00ff; font-size: 24px; }
    </style>
</head>
<body>

    <div id="game-ui">
        GEMS: <span id="coin-count">0</span> | BANK: $<span id="bank-display">0</span>
    </div>

    <div id="menu">
        <h1 style="color: #00ffcc; font-size: 50px; margin: 0; text-shadow: 0 0 20px #00ffcc;">NEON SURFER</h1>
        <p>YOUR BANK: $<span id="menu-bank">0</span></p>

        <div class="shop-box">
            <h3 style="margin-top:0; color:#ff00ff;">CUSTOMIZE</h3>
            <div class="shop-item">
                <span>Neon Pink Skin</span>
                <div><span class="price">$200</span> <button class="buy-btn" onclick="buyItem('pink', 200)">BUY</button></div>
            </div>
            <div class="shop-item">
                <span>Solid Gold Skin</span>
                <div><span class="price">$500</span> <button class="buy-btn" onclick="buyItem('gold', 500)">BUY</button></div>
            </div>
        </div>

        <button class="btn" onclick="startGame()">START RUN</button>
    </div>

    <div id="powerup-ui"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- SAVE & SHOP SYSTEM ---
        if (!localStorage.getItem('subway_init')) {
            localStorage.setItem('subway_bank', 500); // Starter $500
            localStorage.setItem('subway_init', true);
            localStorage.setItem('subway_unlocks', JSON.stringify(['default']));
        }

        let bank = parseInt(localStorage.getItem('subway_bank')) || 0;
        let unlocks = JSON.parse(localStorage.getItem('subway_unlocks'));

        function refreshBankUI() {
            document.getElementById('bank-display').innerText = bank;
            document.getElementById('menu-bank').innerText = bank;
        }
        refreshBankUI();

        function buyItem(id, price) {
            if (unlocks.includes(id)) return alert("Already owned!");
            if (bank >= price) {
                bank -= price;
                unlocks.push(id);
                localStorage.setItem('subway_bank', bank);
                localStorage.setItem('subway_unlocks', JSON.stringify(unlocks));
                refreshBankUI();
                alert("Purchased! Skin Equipped.");
                location.reload(); 
            } else {
                alert("Need more Gems!");
            }
        }

        // --- GAME ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pLight = new THREE.PointLight(0x00ffcc, 1, 100);
        pLight.position.set(0, 5, 5);
        scene.add(pLight);

        let gameRunning = false, speed = 0.7, gemsThisRun = 0;
        let currentLane = 0, vy = 0, isGrounded = true;

        // Player Skin Check
        let pColor = 0x00ffcc;
        if (unlocks.includes('gold')) pColor = 0xffd700;
        else if (unlocks.includes('pink')) pColor = 0xff00ff;

        const player = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.6), new THREE.MeshStandardMaterial({color: pColor, emissive: pColor, emissiveIntensity: 0.2}));
        pBody.position.y = 0.7;
        player.add(pBody);
        scene.add(player);

        const guard = new THREE.Group();
        const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.7), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
        gBody.position.y = 0.75;
        guard.add(gBody);
        guard.position.z = 5;
        scene.add(guard);

        const obstacles = [], gems = [], scenery = [];

        function createSector(z) {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(15, 100), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
            floor.rotation.x = -Math.PI/2; floor.position.z = z; scene.add(floor); scenery.push(floor);

            const railLeft = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 100), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
            railLeft.position.set(-1.8, 0.05, z); scene.add(railLeft); scenery.push(railLeft);
            const railRight = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 100), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
            railRight.position.set(1.8, 0.05, z); scene.add(railRight); scenery.push(railRight);
        }

        function spawnItems(z) {
            const lane = Math.floor(Math.random()*3)-1;
            const lX = lane * 4;
            
            const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xff00ff}));
            gem.position.set(lX, 1, z); scene.add(gem); gems.push(gem);

            const isTrain = Math.random() > 0.7;
            const obs = new THREE.Mesh(
                isTrain ? new THREE.BoxGeometry(3.5, 4, 15) : new THREE.BoxGeometry(3.5, 1.2, 0.6),
                new THREE.MeshStandardMaterial({color: isTrain ? 0xef4444 : 0xfacc15})
            );
            obs.position.set(lX, isTrain ? 2 : 2.5, z - 20);
            scene.add(obs); obstacles.push(obs);
        }

        for(let i=0; i<6; i++) { createSector(-i*100); spawnItems(-60 - (i*50)); }

        function startGame() { 
            document.getElementById('menu').style.display='none'; 
            document.getElementById('game-ui').style.display='block';
            gameRunning=true; 
        }

        window.addEventListener('keydown', (e) => {
            if(!gameRunning) return;
            const k = e.key.toLowerCase();
            if(k === 'a' && currentLane > -1) currentLane--;
            if(k === 'd' && currentLane < 1) currentLane++;
            if(k === ' ' && isGrounded) { vy = 0.35; isGrounded = false; }
            if(k === 's' && isGrounded) { player.scale.y = 0.5; setTimeout(() => { player.scale.y = 1; }, 700); }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(gameRunning) {
                speed += 0.0001;
                camera.position.set(player.position.x * 0.5, 6, player.position.z + 10);
                camera.lookAt(player.position.x, 2, player.position.z - 5);

                player.position.x += (currentLane * 4 - player.position.x) * 0.15;
                player.position.y += vy;
                if(!isGrounded) { vy -= 0.018; if(player.position.y <= 0) { player.position.y = 0; vy = 0; isGrounded = true; } }

                guard.position.x += (player.position.x - guard.position.x) * 0.05;
                guard.position.z = 5 + Math.sin(Date.now()*0.005);

                [...obstacles, ...gems, ...scenery].forEach(o => o.position.z += speed);

                gems.forEach((g, i) => {
                    g.rotation.y += 0.05;
                    if(player.position.distanceTo(g.position) < 1.5) {
                        scene.remove(g); gems.splice(i,1); gemsThisRun++;
                        document.getElementById('coin-count').innerText = gemsThisRun;
                    }
                });

                obstacles.forEach(o => {
                    if(new THREE.Box3().setFromObject(player).intersectsBox(new THREE.Box3().setFromObject(o))) {
                        gameRunning = false;
                        bank += gemsThisRun;
                        localStorage.setItem('subway_bank', bank);
                        alert("GAME OVER! Banked: $" + gemsThisRun); location.reload();
                    }
                });

                scenery.forEach(s => { if(s.position.z > 50) { s.position.z -= 600; if(s.geometry.type === "PlaneGeometry") spawnItems(s.position.z); }});
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
