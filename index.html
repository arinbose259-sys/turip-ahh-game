<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subway Surfers: Neon Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 28px; text-shadow: 0 0 10px #00ffcc; z-index: 10; }
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        .btn { padding: 15px 40px; font-size: 22px; background: #00ffcc; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00ffcc; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); }
        #powerup-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #ff00ff; font-size: 24px; text-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <div id="ui">GEMS: <span id="coin-count">0</span> | BANK: $<span id="bank-total">0</span></div>
    <div id="powerup-ui"></div>

    <div id="menu">
        <h1 style="color: #00ffcc; font-size: 60px; margin: 0; text-shadow: 0 0 20px #00ffcc;">NEON SURFER</h1>
        <p style="color: #888;">THE GUARD IS CHASING YOU!</p>
        <button class="btn" onclick="startGame()">START RUN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- SAVE SYSTEM ---
        if (!localStorage.getItem('subway_init')) { localStorage.setItem('subway_bank', 500); localStorage.setItem('subway_init', true); }
        let bank = parseInt(localStorage.getItem('subway_bank')) || 0;
        document.getElementById('bank-total').innerText = bank;

        // --- ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404040, 0.8));
        const pointLight = new THREE.PointLight(0x00ffcc, 1, 100);
        pointLight.position.set(0, 5, 5);
        scene.add(pointLight);

        let gameRunning = false, speed = 0.65, gemsCollected = 0;
        let currentLane = 0, vy = 0, isGrounded = true;

        // --- PLAYER ---
        const player = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.6), new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.2}));
        pBody.position.y = 0.7;
        player.add(pBody);
        scene.add(player);

        // --- THE GUARD ---
        const guard = new THREE.Group();
        const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.7), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
        const gHead = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        gHead.position.y = 1;
        guard.add(gBody, gHead);
        guard.position.z = 4; // Behind player
        scene.add(guard);

        const obstacles = [], gems = [], scenery = [];

        function createSector(z) {
            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2; floor.position.z = z; scene.add(floor); scenery.push(floor);

            // Lane Dividers (Neon Rails)
            for(let i=-1; i<=1; i+=2) {
                const rail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 100), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
                rail.position.set(i * 1.75, 0.05, z);
                scene.add(rail); scenery.push(rail);
            }

            // High Buildings
            const bMat = new THREE.MeshStandardMaterial({color: 0x050505});
            const bLeft = new THREE.Mesh(new THREE.BoxGeometry(10, 50, 100), bMat);
            bLeft.position.set(-12, 20, z); scene.add(bLeft); scenery.push(bLeft);
            const bRight = new THREE.Mesh(new THREE.BoxGeometry(10, 50, 100), bMat);
            bRight.position.set(12, 20, z); scene.add(bRight); scenery.push(bRight);
        }

        function spawnItems(z) {
            const lane = Math.floor(Math.random()*3)-1;
            const lX = lane * 3.8;
            
            // Neon Gems
            const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xff00ff}));
            gem.position.set(lX, 1, z); scene.add(gem); gems.push(gem);

            // Obstacles
            const isTrain = Math.random() > 0.6;
            const obs = new THREE.Mesh(
                isTrain ? new THREE.BoxGeometry(3, 4, 15) : new THREE.BoxGeometry(3, 1.2, 0.5),
                new THREE.MeshStandardMaterial({color: isTrain ? 0xff3300 : 0xffff00, emissive: isTrain ? 0xaa1100 : 0xaa6600})
            );
            obs.position.set(lX, isTrain ? 2 : 2.5, z - 20);
            scene.add(obs); obstacles.push(obs);
        }

        for(let i=0; i<6; i++) { createSector(-i*100); spawnItems(-60 - (i*50)); }

        function startGame() { document.getElementById('menu').style.display='none'; gameRunning=true; }

        window.addEventListener('keydown', (e) => {
            if(!gameRunning) return;
            const k = e.key.toLowerCase();
            if(k === 'a' && currentLane > -1) currentLane--;
            if(k === 'd' && currentLane < 1) currentLane++;
            if(k === ' ' && isGrounded) { vy = 0.35; isGrounded = false; }
            if(k === 's' && isGrounded) {
                player.scale.y = 0.5;
                setTimeout(() => { player.scale.y = 1; }, 700);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(gameRunning) {
                speed += 0.0001;
                // Camera behind player (Third Person)
                camera.position.set(player.position.x * 0.5, 6, player.position.z + 10);
                camera.lookAt(player.position.x, 2, player.position.z - 10);

                // Player Movement
                player.position.x += (currentLane * 3.8 - player.position.x) * 0.15;
                player.position.y += vy;
                if(!isGrounded) { vy -= 0.018; if(player.position.y <= 0) { player.position.y = 0; vy = 0; isGrounded = true; } }

                // Guard Chasing (Stays just behind)
                guard.position.x += (player.position.x - guard.position.x) * 0.05;
                guard.position.z = 4 + Math.sin(Date.now()*0.005) * 0.5;

                [...obstacles, ...gems, ...scenery].forEach(o => o.position.z += speed);

                // Collections
                gems.forEach((g, i) => {
                    g.rotation.y += 0.05;
                    if(player.position.distanceTo(g.position) < 1.5) {
                        scene.remove(g); gems.splice(i,1); gemsCollected++;
                        document.getElementById('coin-count').innerText = gemsCollected;
                    }
                });

                // Crashes
                obstacles.forEach(o => {
                    if(new THREE.Box3().setFromObject(player).intersectsBox(new THREE.Box3().setFromObject(o))) {
                        gameRunning = false; bank += gemsCollected;
                        localStorage.setItem('subway_bank', bank);
                        alert("CAUGHT BY THE GUARD! Banked: $" + gemsCollected); location.reload();
                    }
                });

                // Recycle
                scenery.forEach(s => { if(s.position.z > 50) { s.position.z -= 600; if(s.geometry.type === "PlaneGeometry") spawnItems(s.position.z); }});
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
