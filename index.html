<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subway Runner Web</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
                   display: flex; flex-direction: column; align-items: center; justify-content: center; 
                   color: white; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="overlay">
        <h1>SUBWAY RUNNER</h1>
        <p>A/D to Switch Lanes | SPACE to Jump | S to Slide</p>
        <button style="padding: 15px 30px; font-size: 20px; cursor: pointer;">START GAME</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Player Lane Logic
        let currentLane = 0; // -1: Left, 0: Middle, 1: Right
        const laneWidth = 3;
        
        // Player Model (Simple Humanoid)
        const playerGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({color: 0x3498db});
        const playerBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.4), bodyMat);
        playerBody.position.y = 1;
        playerGroup.add(playerBody);
        const playerHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        playerHead.position.y = 1.7;
        playerGroup.add(playerHead);
        scene.add(playerGroup);

        // Jumping & Sliding Physics
        let vy = 0;
        let isGrounded = true;
        let isSliding = false;

        // Tracks/Road
        const roadGeo = new THREE.PlaneGeometry(10, 1000);
        const roadMat = new THREE.MeshStandardMaterial({color: 0x333333});
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Obstacles
        let obstacles = [];
        function spawnObstacle() {
            const type = Math.random();
            let geo, mat, yPos;
            
            if (type > 0.5) { // High barrier (must slide)
                geo = new THREE.BoxGeometry(2, 1, 0.5);
                mat = new THREE.MeshStandardMaterial({color: 0xe74c3c});
                yPos = 1.8;
            } else { // Low hurdle (must jump)
                geo = new THREE.BoxGeometry(2, 0.8, 0.5);
                mat = new THREE.MeshStandardMaterial({color: 0xf1c40f});
                yPos = 0.4;
            }

            const obs = new THREE.Mesh(geo, mat);
            const lane = Math.floor(Math.random() * 3) - 1;
            obs.position.set(lane * laneWidth, yPos, -100);
            scene.add(obs);
            obstacles.push(obs);
        }

        let gameRunning = false;
        let score = 0;
        let speed = 0.4;

        // Controls
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'a' && currentLane > -1) currentLane--;
            if (e.key === 'd' && currentLane < 1) currentLane++;
            if (e.key === ' ' && isGrounded) {
                vy = 0.25;
                isGrounded = false;
            }
            if (e.key === 's' && isGrounded) {
                isSliding = true;
                playerBody.scale.y = 0.5;
                playerBody.position.y = 0.5;
                setTimeout(() => {
                    isSliding = false;
                    playerBody.scale.y = 1;
                    playerBody.position.y = 1;
                }, 700);
            }
        });

        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            gameRunning = true;
        });

        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            if (gameRunning) {
                score++;
                document.getElementById('score').innerText = Math.floor(score/10);
                speed += 0.0001; // Get faster over time

                // Smooth lane switching
                const targetX = currentLane * laneWidth;
                playerGroup.position.x += (targetX - playerGroup.position.x) * 0.15;

                // Jump Physics
                playerGroup.position.y += vy;
                if (!isGrounded) {
                    vy -= 0.01; // Gravity
                    if (playerGroup.position.y <= 0) {
                        playerGroup.position.y = 0;
                        vy = 0;
                        isGrounded = true;
                    }
                }

                // Obstacle Management
                if (Math.random() < 0.02) spawnObstacle();

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;

                    // Collision Detection
                    const playerBox = new THREE.Box3().setFromObject(playerGroup);
                    const obsBox = new THREE.Box3().setFromObject(obstacles[i]);

                    if (playerBox.intersectsBox(obsBox)) {
                        gameRunning = false;
                        alert("CRASH! Score: " + Math.floor(score/10));
                        location.reload();
                    }

                    if (obstacles[i].position.z > 10) {
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                    }
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
