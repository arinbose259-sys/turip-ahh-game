<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subway Surfers: Neon Night</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 28px; text-shadow: 0 0 10px #00ffcc; z-index: 10; }
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        .btn { padding: 15px 40px; font-size: 22px; background: #00ffcc; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00ffcc; }
        .shop-item { background: #111; padding: 12px; margin: 8px; border-radius: 12px; width: 350px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        #powerup-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #ff00ff; font-size: 24px; text-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <div id="ui">GEMS: <span id="coin-count">0</span> | BANK: $<span id="bank-total">0</span></div>
    <div id="powerup-ui"></div>

    <div id="menu">
        <h1 style="color: #00ffcc; font-size: 60px; margin-bottom: 5px; text-shadow: 0 0 20px #00ffcc;">NEON RUNNER</h1>
        <div id="shop-container">
            <div class="shop-item"><span>Cyber Skin</span><button class="btn" style="padding:10px 20px; font-size:14px" onclick="buyItem('char_neon', 300)">$300</button></div>
        </div>
        <button class="btn" style="margin-top: 30px;" onclick="startGame()">LAUNCH RUN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- SAVE SYSTEM ---
        if (!localStorage.getItem('subway_init')) { localStorage.setItem('subway_bank', 500); localStorage.setItem('subway_init', true); }
        let bank = parseInt(localStorage.getItem('subway_bank')) || 0;
        let unlocked = JSON.parse(localStorage.getItem('subway_unlocks')) || ['default'];
        document.getElementById('bank-total').innerText = bank;

        function buyItem(id, price) {
            if (bank >= price && !unlocked.includes(id)) {
                bank -= price; unlocked.push(id);
                localStorage.setItem('subway_bank', bank);
                localStorage.setItem('subway_unlocks', JSON.stringify(unlocked));
                location.reload();
            }
        }

        // --- ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const mainLight = new THREE.PointLight(0x00ffcc, 1, 100);
        mainLight.position.set(0, 10, 5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        let gameRunning = false, speed = 0.6, coinsCollected = 0;
        let currentLane = 0, vy = 0, isGrounded = true, isSliding = false;

        // Player & Guard
        const player = new THREE.Group();
        const pMat = new THREE.MeshStandardMaterial({color: unlocked.includes('char_neon') ? 0x00ffcc : 0xffffff});
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.5), pMat);
        pBody.position.y = 1; player.add(pBody);
        scene.add(player);

        const guard = new THREE.Group();
        const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.3, 0.6), new THREE.MeshStandardMaterial({color: 0x0000ff}));
        const gHat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.5), new THREE.MeshStandardMaterial({color: 0x111}));
        gHat.position.y = 1.6; guard.add(gBody, gHat);
        guard.position.z = 5; // Guard stays behind you
        scene.add(guard);

        const obstacles = [], coins = [], scenery = [], powerups = [];

        function createSector(z) {
            // Floor with Neon Lines
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 100), new THREE.MeshStandardMaterial({color: 0x050505}));
            floor.rotation.x = -Math.PI/2; floor.position.z = z; scene.add(floor); scenery.push(floor);

            // Buildings with Glowing Windows
            for(let i=-1; i<=1; i+=2) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(10, 40, 90), new THREE.MeshStandardMaterial({color: 0x111111}));
                b.position.set(i*20, 20, z);
                // Windows
                const win = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.5), new THREE.MeshBasicMaterial({color: 0xffff00}));
                win.position.set(i*14.9, Math.random()*30, z + (Math.random()-0.5)*50);
                scene.add(b, win); scenery.push(b, win);
            }
        }

        function spawnItems(z) {
            const lane = Math.floor(Math.random()*3)-1;
            const lX = lane * 3.5;
            
            // Gem (Coin)
            const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.4), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
            gem.position.set(lX, 1.2, z); scene.add(gem); coins.push(gem);

            // Obstacle
            const isHigh = Math.random() > 0.5;
            const obs = new THREE.Mesh(
                new THREE.BoxGeometry(3, isHigh ? 1 : 2, 0.5), 
                new THREE.MeshStandardMaterial({color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 0.5})
            );
            obs.position.set(lX, isHigh ? 2.8 : 1, z - 20);
            scene.add(obs); obstacles.push(obs);
        }

        for(let i=0; i<6; i++) { createSector(-i*100); spawnItems(-60 - (i*50)); }

        function startGame() { document.getElementById('menu').style.display='none'; gameRunning=true; }

        window.addEventListener('keydown', (e) => {
            if(!gameRunning) return;
            const k = e.key.toLowerCase();
            if(k === 'a' && currentLane > -1) currentLane--;
            if(k === 'd' && currentLane < 1) currentLane++;
            if(k === ' ' && isGrounded) { vy = 0.35; isGrounded = false; }
            if(k === 's' && isGrounded) {
                isSliding = true; player.scale.y = 0.4;
                setTimeout(() => { isSliding = false; player.scale.y = 1; }, 700);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(gameRunning) {
                speed += 0.0001;
                // Sky Color Cycle
                const time = Date.now() * 0.001;
                scene.background = new THREE.Color(`hsl(${(time * 10) % 360}, 50%, 5%)`);

                // Smooth Movement
                player.position.x += (currentLane * 3.5 - player.position.x) * 0.2;
                player.position.y += vy;
                if(!isGrounded) { vy -= 0.018; if(player.position.y <= 0) { player.position.y = 0; vy = 0; isGrounded = true; } }

                // Guard Logic: Gets closer if you play perfectly, but stays back
                guard.position.x += (player.position.x - guard.position.x) * 0.1;
                guard.position.z = 6 + Math.sin(time*2);

                [...obstacles, ...coins, ...scenery].forEach(o => o.position.z += speed);

                // Coin Spin & Collection
                coins.forEach((c, i) => {
                    c.rotation.y += 0.1;
                    if(player.position.distanceTo(c.position) < 1.5) {
                        scene.remove(c); coins.splice(i,1); coinsCollected++;
                        document.getElementById('coin-count').innerText = coinsCollected;
                    }
                });

                // Obstacle Hit
                obstacles.forEach(o => {
                    if(new THREE.Box3().setFromObject(player).intersectsBox(new THREE.Box3().setFromObject(o))) {
                        gameRunning = false; bank += coinsCollected;
                        localStorage.setItem('subway_bank', bank);
                        alert("CAUGHT! Banked: $" + coinsCollected); location.reload();
                    }
                });

                // Recycling
                scenery.forEach(s => { if(s.position.z > 100) { s.position.z -= 600; if(s.geometry.type === "PlaneGeometry") spawnItems(s.position.z); }});
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
